<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    z-index: -1;

    background: radial-gradient(circle, rgba(0, 0, 0, 0.4) 10%, transparent 10%),
                radial-gradient(circle, rgba(255,255,255,0.3) 10%, transparent 10%);

    background-size: 80px 80px;
    animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
    0% {
        transform: translate(0, 0);
    }
    100% {
        transform: translate(200px, 200px);
    }
}

        body{

        }

        .search{
            margin: 20px auto;
            height: 100px;
            width: 300px;
        }

        .btns{
            margin:-50px auto;
            height: fit-content;
            width: fit-content;
        }

        .tasks{
            height: 500px;
            width: 600px;
            border: 1px solid black;
            margin: 10px auto;
            background-color: aliceblue;
            border-radius: 50px;
            box-shadow: 10px 5px 5px rgba(54, 103, 132, 0.977);
        }
        
        ol{
            background: navy;
            
        }

        li{
            margin-top: 50px;
            width: 40%;
            height: fit-content;
            margin: 50px auto;
            font-size: 20px;
        }

        button:hover{
            cursor: pointer;
            box-shadow:3px 3px rgba(54, 62, 132, 0.977);
        }
    </style>
</head>
<body>

    <div class="main">
        <h1 style="margin: 10px auto; height: fit-content; width: fit-content;">A Step towards becoming Productive</h1>

        <button class="addTask">add task</button>

    </div>

    <div class="screen">
        <div class="btns">
            <button class="active">ALL</button>

        <ol class="tasks">
